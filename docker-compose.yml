version: '3.8'

services:
  app:
    build: .
    volumes:
      - .:/app
      - node_modules_data:/app/node_modules 
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_USER: admin
      DB_PASS: admin123
      DB_NAME: sav_trinitydev
    depends_on:
      db:
        condition: service_healthy 

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: sav_trinitydev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U admin -d sav_trinitydev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  node_modules_data: